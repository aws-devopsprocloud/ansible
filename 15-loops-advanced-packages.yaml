- name: Installing and Uninstalling multiple packages using Advanced Loops
  hosts: localhost 
  become: yes
  tasks: 
  - name: Installing and Uninstalling multiple packages
    ansible.builtin.package:
      name: "{{item.name}}"
      state: "{{item.state}}"
    loop:
    - {name: 'git', state: 'present'} 
    - {name: 'nginx', state: 'absent'} 
    - {name: 'postfix', state: 'absent'}